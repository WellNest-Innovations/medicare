name: CI — Lint, Type-check & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend checks ───────────────────────────────────────────
  backend:
    name: Backend — Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps + linters
        run: |
          cd backend
          pip install -r requirements.txt
          pip install black flake8

      - name: black format check
        run: cd backend && black --check --diff app/

      - name: flake8 lint
        run: cd backend && flake8 app/ --max-line-length=100 --ignore=E501,W503

      - name: Verify imports compile
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY: placeholder
          SUPABASE_JWT_SECRET: placeholder
        run: |
          cd backend
          python -c "from app.main import app; print('✅ Backend imports OK')"

  # ── Frontend checks ──────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: TypeScript type-check
        run: cd frontend && npm run type-check

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Production build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: https://placeholder.onrender.com
        run: cd frontend && npm run build
